metadata:
  ambiguity_score: 0.12
  confidence: high
  notes: |
    Source PRD was unusually detailed; the interview resolved the remaining
    "or"-marked decisions (chart lib, cache backend, result URL strategy,
    share scope, currency, trading-day mapping, search strategy, locale
    detection, fallback scope, analytics, meme copy strategy). One technical
    note carried into constraints: yahoo-finance2 is an npm wrapper, not a
    raw fetch, so Vercel's automatic fetch-based Data Cache does not apply
    — it MUST be wrapped via next/cache `unstable_cache` for TTL caching.
